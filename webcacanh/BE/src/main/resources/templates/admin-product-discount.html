<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quản lý giảm giá sản phẩm</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

:root{
--primary-green:#2e7d32;
--dark-green:#1b4332;
--border:#e5e7eb;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI';
}

body{
display:flex;
background:#f4f6f8;
}

/* SIDEBAR */

.sidebar{
width:240px;
height:100vh;
background:var(--dark-green);
color:white;
padding:20px;
position:fixed;
}

.sidebar h2{
margin-bottom:30px;
font-size:26px;
}

.sidebar ul{
list-style:none;
}

.sidebar ul li{
margin:15px 0;
}

.sidebar ul li a{
display:flex;
align-items:center;
gap:10px;
color:white;
text-decoration:none;
padding:10px;
border-radius:6px;
}

.sidebar ul li a:hover{
background:rgba(255,255,255,0.15);
}

.logout{
margin-top:30px;
border-top:1px solid rgba(255,255,255,0.2);
padding-top:15px;
}

.logout a{
display:flex;
align-items:center;
gap:10px;
color:#ffb4b4;
text-decoration:none;
padding:10px;
}

/* MAIN */

.main{
margin-left:240px;
width:100%;
}

.admin-header{
height:70px;
background:white;
border-bottom:1px solid var(--border);
display:flex;
align-items:center;
padding:0 30px;
}

.content{
padding:30px;
}

/* TOP BAR */

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
flex-wrap:wrap;
gap:15px;
}

#searchInput{
padding:8px 12px;
border:1px solid var(--border);
border-radius:6px;
}

.total-product{
background:#e8f5e9;
padding:8px 14px;
border-radius:6px;
font-weight:600;
color:#2e7d32;
}

#categoryFilter{
padding:8px 12px;
border-radius:6px;
border:1px solid var(--border);
cursor:pointer;
}

.add-btn{
background:var(--primary-green);
color:white;
border:none;
padding:10px 18px;
border-radius:6px;
cursor:pointer;
}

.add-btn:hover{
background:#256628;
}

/* TABLE */

.table-box{
background:white;
border-radius:10px;
border:1px solid var(--border);
padding:20px;
overflow-x:auto; 
}

table{
width:100%;
border-collapse:collapse;
table-layout: fixed; 
}

th,td{
padding:12px;

border-bottom:1px solid var(--border);
text-align:left;
}

th{
background:#f1f5f9;
}

.product-img{
width:50px;
height:50px;
border-radius:6px;
object-fit:cover;
}

/* STATUS */

.status-select{
padding:6px 10px;
border-radius:5px;
border:1px solid var(--border);
cursor:pointer;
}

/* ACTION */

.action-btn{
border:none;
padding:6px 10px;
border-radius:4px;
cursor:pointer;
}

.edit{
background:#3b82f6;
color:white;
}

.delete{
background:#ef4444;
color:white;
}

/* PAGINATION */

.pagination-footer{
display:flex;
justify-content:center;
align-items:center;
gap:8px;
margin-top:25px;
padding-top:15px;
border-top:1px solid var(--border);
}

.page-btn{
padding:6px 12px;
border:1px solid var(--border);
background:white;
cursor:pointer;
border-radius:4px;
}

.page-btn.active{
background:var(--primary-green);
color:white;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>ADMIN</h2>

<ul>
<li><a th:href="@{/admindashboard}"><i class="fas fa-chart-line"></i> Dashboard</a></li>
<li><a th:href="@{/admin/products}"><i class="fas fa-box"></i> Quản lý sản phẩm</a></li>
<li><a th:href="@{/admin/orders}"><i class="fas fa-shopping-cart"></i> Đơn hàng</a></li>
<li><a th:href="@{/admin/user}"><i class="fas fa-users"></i> Khách hàng</a></li>
<li><a th:href="@{/admin/vouchers}"><i class="fas fa-ticket"></i> Vouchers</a></li>
<li><a th:href="@{/admin/product-discount}"><i class="fas fa-tags"></i> Giảm giá sản phẩm</a></li>
<li><a th:href="@{/admin/statistics}"><i class="fas fa-chart-bar"></i> Thống kê</a></li>

</ul>

<div class="logout">
<a th:href="@{/logout}">
<i class="fas fa-right-from-bracket"></i> Đăng xuất
</a>
</div>

</div>

<div class="main">

<div class="admin-header">
<h1>Quản lý giảm giá sản phẩm</h1>
</div>

<div class="content">

<div class="top-bar">



<div class="total-product">
Tổng chương trình giảm giá:
<span th:text="${discounts.size()}">0</span>
</div>

<button class="add-btn"
th:onclick="|window.location='@{/admin/product-discount/add}'|"
>
+ Thêm giảm giá
</button>

</div>

<div class="table-box">

<table>

<thead>
<tr>
<th>ID</th>
<th>Hình</th>
<th>Sản phẩm</th>
<th>Giá gốc</th>
<th>% giảm</th>
<th>Giá sau giảm</th>
<th>Số lượng giảm</th>
<th>Trạng thái</th>
<th>Hành động</th>
</tr>
</thead>

<tbody>
    <tr th:each="p : ${discounts}">
        <td th:text="${p.id}"></td>

        <td>
            <img class="product-img" 
                 th:src="${p.images != null && !p.images.empty ? '/images/' + p.images[0].imageUrl : '/images/default.jpg'}" 
                 alt="Product">
        </td>

        <td th:text="${p.name}"></td>

        <td th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')} + 'đ'"></td>

        <td th:text="${p.promotion != null ? p.promotion.discountPercent + '%' : '0%'}"></td>

        <td style="color: red; font-weight: bold;" 
            th:text="${#numbers.formatDecimal(@productDiscountService.getFinalPrice(p), 0, 'COMMA', 0, 'POINT')} + 'đ'">
        </td>

    
    <td style="font-weight: bold; color: #2e7d32;"
    th:text="${p.stock + ' sản phẩm'}">
</td>

        <td>
            <span th:text="${@productDiscountService.getStatus(p)}"></span>
        </td>

        <td>
            <div style="display: flex; gap: 5px;">
                <a th:if="${p.promotion != null}" 
                   th:href="@{/admin/product-discount/remove/{id}(id=${p.id})}" 
                   class="action-btn delete"
                   onclick="return confirm('Bạn có chắc chắn muốn gỡ bỏ giảm giá này?')">
                    <i class="fas fa-trash"></i>
                </a>
            </div>
        </td>
    </tr>
</tbody>
</table>

<div class="pagination-footer"></div>

</div>

</div>

</div>

</body>
</html>
