<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
        }

        /* ✅ ĐÃ THÊM ẢNH NỀN */
        .left-panel {
            flex: 6;
            background: 
                linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
                url('/images/logo_login.jpg') no-repeat center center;
            background-size: cover;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            text-align: center;
            padding: 20px;
        }

        .left-panel h1 {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 1.5rem;
        }

        .left-panel .subtitle {
            font-size: 1.2rem;
            margin-bottom: 4rem;
            font-weight: 400;
        }

        .left-panel .placeholder {
            font-size: 1rem;
            opacity: 0.8;
        }

        .right-panel {
            flex: 4;
            background-color: #e4f7e1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background-color: #ffffff;
            width: 85%;
            max-width: 450px;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .brand-name {
            color: #388e3c;
            font-size: 2.2rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .login-title {
            color: #4caf50;
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
        }

        .input-group {
            margin-bottom: 1rem;
        }

        .input-group input {
            width: 100%;
            padding: 16px 20px;
            border: none;
            border-radius: 10px;
            background-color: #f0f7f0;
            font-size: 1rem;
            outline: none;
            color: #333;
        }

        .input-group input::placeholder {
            color: #888;
        }

        .forgot-password {
            text-align: right;
            margin-bottom: 2rem;
        }

        .forgot-password a {
            color: #555;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-login {
            background-color: #4caf50;
            color: white;
            border: none;
        }

        .btn-login:hover {
            background-color: #45a049;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
            color: #999;
            font-size: 0.9rem;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid #e0e0e0;
        }

        .divider span {
            padding: 0 10px;
            color: #a0ceaa;
        }

        .btn-register {
            background-color: transparent;
            color: #4caf50;
            border: 1px solid #4caf50;
        }

        .btn-register:hover {
            background-color: #f0f7f0;
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .left-panel {
                flex: none;
                height: 40vh;
            }
            .right-panel {
                flex: none;
                height: 60vh;
            }
            .login-card {
                padding: 2rem;
                width: 90%;
            }
        }
    </style>
</head>

<body>
    <div class="left-panel" 
         th:style="'background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url(' + @{/images/logo_login.jpg} + ') no-repeat center center; background-size: cover;'">
        <h1>NEXTGEN GUPPIES</h1>
        <p class="subtitle">Nơi cung cấp phụ kiện cá cảnh chất lượng cao</p>
    </div>

    <div class="right-panel">
        <div class="login-card">
            <h2 class="brand-name">NEXTGEN GUPPIES</h2>
            <p class="login-title">Login</p>

            <form th:action="@{/login}" method="post">
                <div class="input-group">
                    <input type="email" name="email" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <input type="password" name="password" placeholder="Password" required>
                </div>
                <div class="forgot-password">
                    <a th:href="@{/forgot-password}">Forget password ?</a>
                </div>
                <button type="submit" class="btn btn-login">Login</button>
                
                <div class="divider"><span>OR</span></div>
                
                <button type="button" class="btn btn-register"
                        th:onclick="|window.location.href='@{/register}'|">
                    Register
                </button>
            </form>
        </div>
    </div>
</body>
