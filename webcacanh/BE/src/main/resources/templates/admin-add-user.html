<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Thêm người dùng</title>

<link rel="stylesheet"
th:href="@{https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css}"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

:root{
--primary:#2e7d32;
--dark:#1b4332;
--border:#e5e7eb;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI';
}

body{
display:flex;
background:#f4f6f8;
}

/* SIDEBAR */

.sidebar{
width:240px;
height:100vh;
background:var(--dark);
color:white;
padding:20px;
position:fixed;
}

.sidebar h2{
margin-bottom:30px;
font-size:26px;
}

.sidebar ul{
list-style:none;
}

.sidebar li{
margin:14px 0;
}

.sidebar a{
color:white;
text-decoration:none;
display:flex;
gap:12px;
align-items:center;
padding:10px;
border-radius:6px;
}

.sidebar a:hover{
background:rgba(255,255,255,0.15);
}

/* logout */

.logout{
margin-top:20px;
border-top:1px solid rgba(255,255,255,0.2);
padding-top:15px;
}

.logout a{
color:#ffb4b4;
}

/* MAIN */

.main{
margin-left:240px;
width:100%;
}

/* HEADER */

.admin-header{
height:70px;
background:white;
border-bottom:1px solid var(--border);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 30px;
}

.admin-header h1{
font-size:30px;
font-weight:700;
}

/* CONTENT */

.content{
padding:30px;
width:100%;
}

/* CARD */

.card{
width:100%;
background:white;
border-radius:10px;
border:1px solid var(--border);
padding:35px;
}

/* FORM GRID */

.form-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:25px;
margin-top:10px;
}

/* FORM */

.form-group{
display:flex;
flex-direction:column;
gap:6px;
}

.form-group label{
font-weight:600;
font-size:14px;
}

.form-group input,
.form-group select,
.form-group textarea{
padding:10px;
border:1px solid var(--border);
border-radius:6px;
font-size:14px;
}

textarea{
grid-column:2;
min-height:90px;
resize:vertical;
}

/* BUTTON */

.actions{
margin-top:25px;
display:flex;
gap:12px;
}

.btn{
padding:10px 20px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

.btn-save{
background:var(--primary);
color:white;
}

.btn-save:hover{
opacity:0.9;
}

.btn-cancel{
background:#e5e7eb;
}

</style>
</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<h2>ADMIN</h2>

<ul>

<li>
<a th:href="@{/admin/dashboard}">
<i class="fas fa-chart-line"></i> Dashboard
</a>
</li>

<li>
<a th:href="@{/admin/products}">
<i class="fas fa-box"></i> Quản lý sản phẩm
</a>
</li>

<li>
<a th:href="@{/admin/orders}">
<i class="fas fa-shopping-cart"></i> Đơn hàng
</a>
</li>

<li>
<a th:href="@{/admin/users}">
<i class="fas fa-users"></i> Khách hàng
</a>
</li>

<li>
<a href="#">
<i class="fas fa-ticket"></i> Voucher
</a>
</li>

<li>
<a th:href="@{/admin/product-discount}">
<i class="fas fa-tags"></i> Giảm giá sản phẩm
</a>
</li>

<li>
<a href="#">
<i class="fas fa-chart-bar"></i> Thống kê
</a>
</li>



</ul>

<div class="logout">
<a th:href="@{/logout}">
<i class="fas fa-right-from-bracket"></i>
Đăng xuất
</a>
</div>

</div>

<!-- MAIN -->

<div class="main">

<div class="admin-header">
<h1>Thêm người dùng</h1>
</div>

<div class="content">

<div class="card">

<form th:action="@{/admin/users/save}" method="post">

<div class="form-grid">

<div class="form-group">
<label><i class="fa fa-user"></i> Tên người dùng</label>
<input type="text" name="name" placeholder="Nhập tên người dùng">
</div>

<div class="form-group">
<label><i class="fa fa-phone"></i> Số điện thoại</label>
<input type="text" name="phone" placeholder="Nhập số điện thoại">
</div>

<div class="form-group">
<label><i class="fa fa-envelope"></i> Email</label>
<input type="email" name="email" placeholder="Nhập email">
</div>

<div class="form-group">
<label><i class="fa fa-lock"></i> Password</label>
<input type="password" name="password" placeholder="Nhập mật khẩu">
</div>

<div class="form-group">
<label><i class="fa fa-user-shield"></i> Phân quyền</label>
<select name="role">
<option value="">-- Chọn quyền --</option>
<option value="ADMIN">Admin</option>

<option value="USER">Khách hàng</option>
</select>
</div>

<div class="form-group">
<label><i class="fa fa-map-marker-alt"></i> Địa chỉ</label>
<textarea name="address" placeholder="Nhập địa chỉ"></textarea>
</div>

</div>

<div class="actions">

<button class="btn btn-save">
<i class="fas fa-save"></i> Lưu người dùng
</button>

<a th:href="@{/admin/users}">
<button type="button" class="btn btn-cancel">
Huỷ
</button>
</a>

</div>

</form>

</div>

</div>

</div>

</body>
</html>
