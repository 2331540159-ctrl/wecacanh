<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <div th:replace="~{header :: head_common}"></div>
    <title>Tin tức</title>
</head>
<body>
    <div th:replace="~{header :: top_header}"></div>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-green: #2e7d32;
            --dark-green: #1b4332;
            --light-green: #4caf50;
            --border: #e5e7eb;
            --text-gray: #6b7280;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma; }
        body { background: #f9fafb; color: #333; }
        .container { max-width: 1200px; margin: auto; padding: 0 20px; }

        /* MAIN CONTENT */
        .main-content { padding: 40px 0; display: flex; gap: 30px; min-height: 600px; }

        /* SIDEBAR */
        .sidebar { width: 260px; border: 1px solid var(--border); border-radius: 12px; padding: 20px; height: fit-content; background: #fff; position: sticky; top: 20px; }
        .sidebar-title { display: flex;
                align-items: center;
                gap: 10px;
                color: var(--dark-green);
                font-size: 16px;
                font-weight: bold;
                margin-bottom: 30px; }
        .category-list { list-style: none; }
        .category-list li { margin-bottom: 15px; }
        .category-list a {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0; /* Thêm padding trên và dưới để giãn dòng */
    color: var(--text-gray);
    text-decoration: none;
    transition: 0.3s;
}
        .category-list a:hover { color: var(--dark-green); }
        .category-list i { color: var(--dark-green); width: 18px; text-align: center; }

        /* NEWS GRID */
        .news-grid { flex: 1; display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .grid-column { display: flex; flex-direction: column; gap: 20px; }
        .column-title { font-size: 18px; font-weight: bold; color: var(--dark-green); margin-bottom: 10px; border-bottom: 2px solid var(--primary-green); padding-bottom: 5px; }

        .news-card { border: 1px solid var(--border); border-radius: 12px; background: white; padding: 15px; display: flex; flex-direction: column; transition: 0.3s; }
        .news-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .news-card img { width: 100%; height: 160px; object-fit: cover; border-radius: 8px; margin-bottom: 12px; }

        .news-title { font-weight: bold; margin-bottom: 8px; color: var(--dark-green); font-size: 16px; min-height: 40px; }
        .news-desc { font-size: 14px; color: var(--text-gray); margin-bottom: 15px; line-height: 1.4; }
        .btn-read { background: var(--dark-green); color: white; padding: 8px 15px; border-radius: 5px; font-size: 13px; text-decoration: none; text-align: center; align-self: flex-start; }

        @media (max-width: 992px) {
            .main-content { flex-direction: column; }
            .sidebar { width: 100%; position: static; }
            .news-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 600px) {
            .news-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <main class="container main-content">
        
        <aside class="sidebar">
            <div class="sidebar-title">
                <i class="fas fa-th-large"></i> Danh mục
            </div>
            <ul class="category-list">
                <a th:href="@{/category/1}"><i class="fa-solid fa-fish"></i> Cá cảnh</a>
                <a th:href="@{/category/2}"><i class="fa-solid fa-fish"></i> Hồ cá</a>
                <a th:href="@{/category/3}"><i class="fa-solid fa-fish"></i> Máy Lọc</a>
                <a th:href="@{/category/4}"><i class="fa-solid fa-fish"></i> Thức ăn</a>
                <a th:href="@{/category/5}"><i class="fa-solid fa-fish"></i> Đèn thủy sinh</a>
                <a th:href="@{/category/6}"><i class="fa-solid fa-fish"></i> Thuốc</a>
                <a th:href="@{/category/7}"><i class="fa-solid fa-fish"></i> Cây thủy sinh</a>
                <a th:href="@{/category/8}"><i class="fa-solid fa-fish"></i> Combo hồ cá</a>
                <a th:href="@{/news}"><i class="fa-solid fa-fish"></i> Tin tức</a>
                <a th:href="@{/order-history}"><i class="fa-solid fa-fish"></i> Lịch sử mua hàng</a>
            </ul>
        </aside>

        
    </main>

</body>
</html>
