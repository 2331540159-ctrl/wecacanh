<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Thêm Voucher</title>

<link rel="stylesheet"
th:href="@{https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css}"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

:root{
--primary-green:#2e7d32;
--dark-green:#1b4332;
--border:#e5e7eb;
}
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI';
}

body{
display:flex;
background:#f4f6f8;
}


/* SIDEBAR */

.sidebar{
width:240px;
height:100vh;
background:var(--dark-green);
color:white;
padding:20px;
position:fixed;
}

.sidebar h2{
margin-bottom:30px;
font-size:26px;
}

.sidebar ul{
list-style:none;
}

.sidebar ul li{
margin:15px 0;
}

.sidebar ul li a{
display:flex;
align-items:center;
gap:10px;
color:white;
text-decoration:none;
padding:10px;
border-radius:6px;
}

.sidebar ul li a:hover{
background:rgba(255,255,255,0.15);
}

.logout{
margin-top:30px;
border-top:1px solid rgba(255,255,255,0.2);
padding-top:15px;
}

.logout a{
display:flex;
align-items:center;
gap:10px;
color:#ffb4b4;
text-decoration:none;
padding:10px;
}

/* logout */

.logout{
margin-top:20px;
border-top:1px solid rgba(255,255,255,0.2);
padding-top:15px;
}


/* MAIN */

.main{
margin-left:240px;
width:100%;
}

/* HEADER */

.admin-header{
height:70px;
background:white;
border-bottom:1px solid var(--border);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 30px;
}

.admin-header h1{
font-size:30px;
}

/* CONTENT */

.content{
padding:30px;
width:100%;
}

/* CARD */

.card{
background:white;
border-radius:10px;
border:1px solid var(--border);
padding:30px;
}

/* FORM GRID */

.form-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:25px;
margin-top:10px;
}

/* FORM */

.form-group{
display:flex;
flex-direction:column;
gap:6px;
}

.form-group label{
font-weight:600;
font-size:14px;
}

.form-group input,
.form-group select{
padding:10px;
border:1px solid var(--border);
border-radius:6px;
font-size:14px;
}

/* BUTTON */

.actions{
margin-top:25px;
display:flex;
gap:12px;
}

.btn{
padding:10px 20px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

/* Tìm dòng này */
.btn-save {
    background: var(--primary-green); /* Thêm -green vào cho đúng tên biến đã khai báo ở :root */
    color: white;
}

.btn-cancel{
background:#e5e7eb;
}

.error{
    color:red;
    font-size:13px;
}
@media (max-width: 768px){
    .form-grid{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<h2>ADMIN</h2>

<ul>
<li><a th:href="@{/admin/dashboard}"><i class="fas fa-chart-line"></i> Dashboard</a></li>
<li><a th:href="@{/admin/products}"><i class="fas fa-box"></i> Quản lý sản phẩm</a></li>
<li><a th:href="@{/admin/orders}"><i class="fas fa-shopping-cart"></i> Đơn hàng</a></li>
<li><a th:href="@{/admin/user}"><i class="fas fa-users"></i> Khách hàng</a></li>
<li><a th:href="@{/admin/vouchers}"><i class="fas fa-ticket"></i> Vouchers</a></li>
<li><a th:href="@{/admin/product-discount}"><i class="fas fa-tags"></i> Giảm giá sản phẩm</a></li>
<li><a th:href="@{/admin/statistics}"><i class="fas fa-chart-bar"></i> Thống kê</a></li>
</ul>

<div class="logout">
<a th:href="@{/logout}">
<i class="fas fa-right-from-bracket"></i>
Đăng xuất
</a>
</div>

</div>

<!-- MAIN -->

<div class="main">

<div class="admin-header">
<h1 th:text="${isEdit} ? 'Cập nhật Voucher' : 'Thêm Voucher'"></h1>
</div>

<div class="content">

<div class="card">

<form th:action="@{/admin/vouchers/save}"
      method="post"
      th:object="${voucher}">
    
<!--
<input type="hidden"
       th:name="${_csrf.parameterName}"
       th:value="${_csrf.token}">
-->
           
<div style="color:red; margin-bottom:10px"
     th:if="${error}"
     th:text="${error}">
</div>

<div class="form-grid">

    <div class="form-group">
        <label>Mã voucher</label>
        <input type="text" th:field="*{code}" placeholder="VD: SALE10"required>
        <span class="error" th:errors="*{code}"></span>
    </div>

    <div class="form-group">
        <label>Phần trăm giảm (%)</label>
        <input type="number" th:field="*{discountPercent}" placeholder="VD: 10"required>
        <span class="error" th:errors="*{discountPercent}"></span>
    </div>

    <div class="form-group">
        <label>Giảm tối đa</label>
        <input type="number" step="0.01" th:field="*{maxDiscount}" placeholder="VD: 100000"required>
        <span class="error" th:errors="*{maxDiscount}"></span>
    </div>

    <div class="form-group">
        <label>Đơn tối thiểu</label>
        <input type="number" step="0.01" th:field="*{minOrderValue}" placeholder="VD: 300000"required>
        <span class="error" th:errors="*{minOrderValue}"></span>
    </div>

    <div class="form-group">
        <label>Số lượng</label>
        <input type="number" th:field="*{quantity}" placeholder="VD: 50"required>
        <span class="error" th:errors="*{quantity}"></span>
    </div>

    <div class="form-group">
        <label>Trạng thái</label>
        <select th:field="*{status}">
            <option value="ACTIVE">Đang diễn ra</option>
            <option value="INACTIVE">Dừng</option>
        </select>
        <span class="error" th:errors="*{status}"></span>
    </div>

    <div class="form-group">
        <label>Ngày bắt đầu</label>
        <input type="date" th:field="*{startDate}">
        <span class="error" th:errors="*{startDate}"></span>
    </div>

    <div class="form-group">
        <label>Ngày kết thúc</label>
        <input type="date" th:field="*{endDate}">
        <span class="error" th:errors="*{endDate}"></span>
    </div>

</div>
<div class="actions">

<button type="submit" class="btn btn-save">
 Lưu Voucher
</button>

<a th:href="@{/admin/vouchers}" class="btn btn-cancel">
    Huỷ
</a>

</div>

</form>

</div>

</div>

</div>

</body>
</html>
