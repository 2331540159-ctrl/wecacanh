<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head_common">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --primary-green: #2e7d32; 
            --dark-green: #1b4332; 
            --light-green: #4caf50; 
            --border: #e5e7eb; 
            --text-gray: #6b7280; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: #f9fafb; color: #333; }
        
        /* HEADER FIX */
        .header-wrapper { 
            background: white; 
            border-bottom: 1px solid var(--border); 
            position: sticky; 
            top: 0; 
            z-index: 1000;
        }
        .header-content { 
            max-width: 1200px; 
            margin: auto; 
            padding: 0 20px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            height: 85px; 
        }
        
        .logo { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            font-size: 20px; 
            font-weight: bold; 
            color: var(--dark-green); 
            text-decoration: none;
            flex-shrink: 0; /* Không cho logo bị bóp nhỏ */
        }
        .logo img { width: 45px; height: 45px; object-fit: cover; border-radius: 50%; }

        .search-box { 
            flex: 1; 
            margin: 0 30px; 
            position: relative; 
            max-width: 500px; /* Giới hạn độ rộng thanh search */
        }
        .search-box input { 
            width: 100%; 
            padding: 10px 40px; 
            border-radius: 25px; 
            border: 1px solid var(--border); 
            outline: none;
            background: #f3f4f6;
        }
        .search-box i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-gray); }

        .contact-info { 
            display: flex; 
            flex-direction: column; 
            font-size: 13px; 
            color: #444; 
            margin-right: 20px;
            white-space: nowrap; /* Không cho nhảy dòng */
        }
        .contact-info i { color: var(--primary-green); width: 16px; }

        .header-actions { display: flex; align-items: center; gap: 15px; flex-shrink: 0; }
        .cart-icon { font-size: 22px; color: var(--dark-green); position: relative; text-decoration: none; }
        
        .menu-toggle { position: relative; cursor: pointer; padding: 5px; }
        .menu-dropdown { 
            position: absolute; 
            top: 100%; 
            right: 0; 
            background: white; 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            width: 180px; 
            display: none; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); 
            z-index: 101; 
        }
        .menu-dropdown a { display: block; padding: 12px 15px; text-decoration: none; color: #333; font-size: 14px; border-bottom: 1px solid #f3f4f6; }
        .menu-dropdown a:hover { background: #f9fafb; color: var(--primary-green); }
        .menu-toggle:hover .menu-dropdown { display: block; }
    </style>
</head>

<body>
    <div th:fragment="top_header" class="header-wrapper">
        <div class="header-content">
            <a th:href="@{/}" class="logo">
                <img th:src="@{/images/logo.jpg}" alt="Logo">
                <span>NEXTGEN GUPPIES</span>
            </a>
            
            <form th:action="@{/search}" method="GET" style="display: flex; align-items: center;">
    <input type="text" name="keyword" placeholder="Tìm kiếm sản phẩm..."
        th:value="${keyword}"
        ><button type="submit" style="display: none;">Tìm kiếm sản phẩm </button>
</form>
            
            <div class="contact-info">
                <div><i class="fas fa-phone"></i> 0866.673.351</div>
                <div><i class="fas fa-map-marker-alt"></i> Phú Nhuận, TP.HCM</div>
            </div>
            
            <div class="header-actions">
                <a class="cart-icon" th:href="@{/cart}">
                    <i class="fas fa-shopping-cart"></i>
                </a>
                <div class="menu-toggle">
                    <i class="fas fa-bars" style="font-size: 22px; color: var(--dark-green);"></i>
                    <div class="menu-dropdown">
                        <a th:href="@{/profile}">Trang cá nhân</a>
                        <a th:href="@{/order-history}">Đơn mua</a>
                        <a th:href="@{/logout}">Đăng xuất</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
