<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sửa thống kê</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Cập nhật bản ghi nhập hàng</h4>
            </div>
            <div class="card-body">
                <form th:action="@{/admin/statistics/save}" th:object="${record}" method="post">
                    <input type="hidden" th:field="*{id}">

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Ngày nhập</label>
                            <input type="date" class="form-control" th:field="*{importDate}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Loại sản phẩm</label>
                            <input type="text" class="form-control" th:field="*{categoryName}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Số lượng nhập</label>
                            <input type="number" class="form-control" th:field="*{importQuantity}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Tổng tiền nhập</label>
                            <input type="number" step="50000" class="form-control" th:field="*{totalImportPrice}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Tổng sản phẩm</label>
                            <input type="number" class="form-control" th:field="*{totalProducts}">
                        </div>
                    </div>

                    <div class="mt-4 border-top pt-3 text-end">
                        <a href="/admin/statistics" class="btn btn-secondary">Hủy</a>
                        <button type="submit" class="btn btn-success">Lưu thay đổi</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
